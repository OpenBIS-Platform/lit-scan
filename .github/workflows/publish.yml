name: Publish to NPM

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install Chrome dependencies (for Puppeteer E2E tests)
        run: |
          sudo apt-get update
          sudo apt-get install -yq --no-install-recommends libnss3 libdrm2 libgtk-3-0 libgbm1 libxshmfence1 doxygen
      
      - name: Install dependencies
        run: npm ci

      - name: Run automated tests
        run: npm run test

      - name: Build DevTools extension and production bundle
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
