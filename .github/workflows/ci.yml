name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: Install Chrome dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -yq --no-install-recommends libnss3 libdrm2 libgtk-3-0 libgbm1 libxshmfence1 doxygen
        
    - run: npm ci
    - run: npm run build
    - run: npm run test
